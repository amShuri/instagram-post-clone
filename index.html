<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <title>Instagram Clone</title>
    </head>
    <body>
        <header class="logo-header">
            <img src="images/logo.png" alt="" class="logo-img">
            <img src="images/user-avatar.png" alt="User Name Here" class="user-avatar">
        </header>
        
        <main>
            <article>
                <div class="post-content">
                    <header class="post-header">
                            <img 
                                src="images/avatar-vangogh.jpg" 
                                alt="Vince van Gogh"
                                class="user-avatar">
                            <div>
                                <p class="post-author">Vincent van Gogh</p>
                                <p class="post-location">Zudert, Netherlands</p>
                            </div>
                    </header>
                </div>
                
                <img src="images/post-vangogh.jpg" alt="Vince van Gogh">
                
                <div class="post-content">
                    <div class="post-icons">
                        <button type="button" aria-label="Like" class="post-btn">
                            <img src="images/icon-heart.png" alt="" class="post-icon">
                        </button>
                        <button type="button" aria-label="Comment" class="post-btn">
                            <img src="images/icon-comment.png" alt="" class="post-icon">
                        </button>
                        <button type="button" aria-label="Share" class="post-btn">
                            <img src="images/icon-dm.png" alt="" class="post-icon">
                        </button>
                    </div>
                    
                    <p class="post-likes">21,492 likes</p>
                    
                    <p>
                        <span class="post-username">vincey1853 </span>
                        just took a few mushrooms lol
                    </p>
                </div>
            </article>
        </main>
    </body>
</html>
